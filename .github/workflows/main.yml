on:
  push:
    branches:
      - codex/create-event-booking-platform-application-93n99i

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -e

            APP_DIR="/opt/myapp2.0"

            mkdir -p $APP_DIR

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/shakthimonesh03-art/myapp2.0.git $APP_DIR
            fi

            cd $APP_DIR

            git fetch origin codex/create-event-booking-platform-application-93n99i
            git reset --hard origin/codex/create-event-booking-platform-application-93n99i

            docker compose down || true
            docker compose up -d --build

            docker image prune -f
