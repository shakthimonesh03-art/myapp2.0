services:
  ticketpulse-web:
    build:
      context: .
      target: dev
    container_name: ticketpulse-web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- -H 0.0.0.0 -p 3000
